<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Medicamentos</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 20px;
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #2c7be5;
    color: white;
}

.low {
    background: #fff3cd;
}

.out {
    background: #f8d7da;
}

input {
    width: 60px;
    text-align: center;
}
</style>
</head>

<body>

<h1>💊 Controle de Medicamentos</h1>

<table>
<thead>
<tr>
<th>Medicamento</th>
<th>Dosagem</th>
<th>Quantidade</th>
<th>Indicação</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>
const meds = [
    ["Donepezila", "10 mg", "Alzheimer"],
    ["Risperidona", "1 mg", "Antipsicótico"],
    ["Venlafaxina", "150 mg", "Antidepressivo"],
    ["Clonazepam", "2 mg", "Ansiedade"],
    ["Losartana", "50 mg", "Hipertensão"],
    ["Anlodipino", "5 mg", "Hipertensão"],
    ["Amitriptilina", "25 mg", "Sono / Dor"],
    ["Glifage XR", "500 mg", "Diabetes"],
    ["Rosuvastatina", "20 mg", "Colesterol"],
    ["Alendronato", "70 mg", "Osteoporose"]
];

const table = document.getElementById("tableBody");

// carregar dados salvos
const saved = JSON.parse(localStorage.getItem("meds")) || {};

// montar tabela
meds.forEach((med, i) => {
    const tr = document.createElement("tr");

    const qtd = saved[i] ?? 0;

    tr.innerHTML = `
        <td>${med[0]}</td>
        <td>${med[1]}</td>
        <td><input type="number" value="${qtd}" data-id="${i}"></td>
        <td>${med[2]}</td>
        <td class="status"></td>
    `;

    table.appendChild(tr);
});

// atualizar status
function update() {
    const inputs = document.querySelectorAll("input");
    let data = {};

    inputs.forEach(input => {
        const val = parseInt(input.value) || 0;
        const id = input.dataset.id;
        const row = input.parentElement.parentElement;
        const status = row.querySelector(".status");

        row.classList.remove("low", "out");

        if (val === 0) {
            status.textContent = "⚠️ Zerado";
            row.classList.add("out");
        } else if (val <= 5) {
            status.textContent = "⚠️ Baixo";
            row.classList.add("low");
        } else {
            status.textContent = "✅ OK";
        }

        data[id] = val;
    });

    localStorage.setItem("meds", JSON.stringify(data));
}

// eventos
document.addEventListener("input", update);

// rodar ao iniciar
update();
</script>

</body>
</html>
