<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de medicamentos - Sra. Ana Demetrio</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 20px;
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    background: white;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #2c7be5;
    color: white;
}

.low { background: #fff3cd; }
.out { background: #f8d7da; }

input {
    padding: 5px;
    text-align: center;
}

.date {
    width: 140px;
}
</style>
</head>

<body>

<h1>💊 Controle de medicamentos - Sra. Ana Demetrio</h1>

<table>
<thead>
<tr>
<th>Medicamento</th>
<th>Dosagem</th>
<th>Quantidade de comprimidos</th>
<th>Indicação</th>
<th>Última Receita</th>
<th>Renovar</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>
const meds = [
    ["Donepezila", "10 mg", "Alzheimer"],
    ["Risperidona", "1 mg", "Antipsicótico"],
    ["Venlafaxina", "150 mg", "Antidepressivo"],
    ["Clonazepam", "2 mg", "Ansiedade"],
    ["Losartana", "50 mg", "Hipertensão"],
    ["Anlodipino", "5 mg", "Hipertensão"],
    ["Amitriptilina", "25 mg", "Sono / Dor"],
    ["Glifage XR", "500 mg", "Diabetes"],
    ["Alendronato", "70 mg", "Osteoporose"]
];

const table = document.getElementById("tableBody");
const saved = JSON.parse(localStorage.getItem("meds")) || {};

meds.forEach((med, i) => {
    const tr = document.createElement("tr");

    const data = saved[i] || { qtd: 0, receita: "" };

    tr.innerHTML = `
        <td>${med[0]}</td>
        <td>${med[1]}</td>
        <td><input type="number" value="${data.qtd}" data-id="${i}" class="qtd"></td>
        <td>${med[2]}</td>
        <td><input type="date" value="${data.receita}" data-id="${i}" class="receita date"></td>
        <td class="renovar"></td>
        <td class="status"></td>
    `;

    table.appendChild(tr);
});

function calcularRenovacao(dataStr) {
    if (!dataStr) return "-";
    const data = new Date(dataStr);
    data.setDate(data.getDate() + 30);
    return data.toLocaleDateString("pt-BR");
}

function diasRestantes(dataStr) {
    if (!dataStr) return null;
    const hoje = new Date();
    const data = new Date(dataStr);
    data.setDate(data.getDate() + 30);
    return Math.ceil((data - hoje) / (1000 * 60 * 60 * 24));
}

function update() {
    const rows = document.querySelectorAll("#tableBody tr");
    let data = {};

    rows.forEach((row, i) => {
        const qtdInput = row.querySelector(".qtd");
        const receitaInput = row.querySelector(".receita");
        const status = row.querySelector(".status");
        const renovar = row.querySelector(".renovar");

        const qtd = parseInt(qtdInput.value) || 0;
        const receita = receitaInput.value;

        row.classList.remove("low", "out");

        // Status estoque
        if (qtd === 0) {
            status.textContent = "⚠️ Zerado";
            row.classList.add("out");
        } else if (qtd <= 5) {
            status.textContent = "⚠️ Baixo";
            row.classList.add("low");
        } else {
            status.textContent = "✅ OK";
        }

        // Renovação receita
        const dias = diasRestantes(receita);

        if (dias === null) {
            renovar.textContent = "-";
        } else if (dias <= 0) {
            renovar.textContent = "🚨 Vencida";
            row.classList.add("out");
        } else if (dias <= 5) {
            renovar.textContent = `⚠️ ${dias} dias`;
            row.classList.add("low");
        } else {
            renovar.textContent = calcularRenovacao(receita);
        }

        data[i] = { qtd, receita };
    });

    localStorage.setItem("meds", JSON.stringify(data));
}

document.addEventListener("input", update);
update();
</script>

</body>
</html>
